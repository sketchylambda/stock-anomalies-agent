- name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio  # Ensure the async plugin is explicitly installed

      - name: Run Pytest
        env:
          # Provide dummy variables just to satisfy Pydantic during import
          GEMINI_API_KEY: "dummy_key_for_testing"
          GCP_PROJECT_ID: "dummy_project_id"
          BQ_DATASET_ID: "dummy_dataset"
          BQ_TABLE_ID: "dummy_table"
        run: |
          pytest -v